<!DOCTYPE html>
<html>
    <head>
        <title>Auto IT Support Toolkit Dashboard</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>

    <body>
        <h1>Auto IT Support Toolkit Dashboard</h1>
        <div class="panel">
            <h2>System Overview</h2>
            <p>Monitoring active...</p>
        </div>
        <div class="panel">
            <h2>Last Detected Issues</h2>
            <ul id="latest"></ul>
        </div>
        <div class="panel">
            <h2>Issue History</h2>
            <ul id="history"></ul>
        </div>
        <script>
            async function fetchData() {
                const latestRes = await fetch('/latest');
                const latest = await latestRes.json();

                const historyRes = await fetch('/tickets');
                const history = await historyRes.json();

                const latestList = document.getElementById('latest');
                const historyList = document.getElementById('history');

                latestList.innerHTML = '';
                historyList.innerHTML = '';

                latest.forEach(issue => {
                    const li = document.createElement('li');
                    li.className = issue.severity.toLowerCase();
                    li.textContent = `[${issue.severity}] ${issue.issue} -> ${issue.action_taken}`;
                    latestList.appendChild(li);
                });

                history.slice(0, 20).forEach(issue => {
                    const li = document.createElement('li');
                    li.className = issue.severity.toLowerCase();
                    li.textContent = `[${issue.severity}] ${issue.issue}`;
                    historyList.appendChild(li);
                });
            }

            setInterval(fetchData, 3000);
            fetchData();
        </script>
    </body>
</html>
